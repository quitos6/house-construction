<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Nova — Planeamento Financeiro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0b;
  --bg2: #111114;
  --bg3: #18181d;
  --bg4: #1f1f26;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0ede8;
  --text2: #8a8790;
  --text3: #4a4858;
  --accent: #c8f060;
  --accent2: #a3d43a;
  --blue: #4f9cf9;
  --amber: #f5a623;
  --red: #f04040;
  --teal: #2dd4a0;
  --purple: #9b7ef8;
  --font-display: 'Syne', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --r: 10px;
  --r2: 16px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  min-height: 100vh;
  font-size: 13px;
  line-height: 1.6;
}

/* ── NOISE OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

/* ── GRID BACKGROUND ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

/* ── HEADER ── */
.header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding-bottom: 2rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2rem;
  gap: 1rem;
  flex-wrap: wrap;
}
.header-left {}
.header-tag {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.header-title {
  font-family: var(--font-display);
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.02em;
  line-height: 1.1;
}
.header-title span { color: var(--accent); }
.header-meta {
  font-size: 12px;
  color: var(--text2);
  margin-top: 8px;
}
.last-updated {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text3);
  background: var(--bg3);
  border: 1px solid var(--border);
  padding: 6px 12px;
  border-radius: var(--r);
  align-self: flex-start;
}

/* ── HERO METRICS ── */
.hero {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  overflow: hidden;
  margin-bottom: 1.5rem;
}
.hero-card {
  background: var(--bg2);
  padding: 1.5rem;
  position: relative;
  overflow: hidden;
  transition: background 0.2s;
}
.hero-card:hover { background: var(--bg3); }
.hero-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: transparent;
  transition: background 0.2s;
}
.hero-card.total::before { background: var(--accent); }
.hero-card.spent::before { background: var(--red); }
.hero-card.paid::before { background: var(--amber); }
.hero-card.free::before { background: var(--teal); }

.hero-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text2);
  margin-bottom: 10px;
}
.hero-value {
  font-family: var(--font-display);
  font-size: clamp(20px, 3vw, 28px);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1;
  margin-bottom: 4px;
}
.hero-value.total { color: var(--accent); }
.hero-value.spent { color: var(--red); }
.hero-value.paid { color: var(--amber); }
.hero-value.free { color: var(--teal); }
.hero-sub { font-size: 11px; color: var(--text3); }

/* ── BUDGET BAR ── */
.budget-bar-section {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
}
.bar-title {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 1rem;
}
.master-bar {
  height: 10px;
  background: var(--bg4);
  border-radius: 99px;
  overflow: hidden;
  display: flex;
  margin-bottom: 1rem;
}
.bar-seg { height: 100%; transition: width 0.6s cubic-bezier(0.16,1,0.3,1); }
.bar-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  font-size: 11px;
  color: var(--text2);
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

/* ── TABS ── */
.tabs {
  display: flex;
  gap: 2px;
  margin-bottom: 1.5rem;
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 4px;
  border-radius: var(--r);
  overflow-x: auto;
  flex-wrap: wrap;
}
.tab {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text2);
  background: transparent;
  border: none;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.tab:hover { color: var(--text); background: var(--bg3); }
.tab.active {
  background: var(--bg4);
  color: var(--text);
  border: 1px solid var(--border2);
}

/* ── PANELS ── */
.panel { display: none; }
.panel.active { display: block; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

/* ── SECTION BLOCKS ── */
.block {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  margin-bottom: 1rem;
  overflow: hidden;
}
.block-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 8px;
}
.block-title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}
.block-total {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 500;
  color: var(--accent);
}

/* ── TABLE ── */
.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 10px 16px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  font-weight: 400;
}
.data-table th.right { text-align: right; }
.data-table td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: middle;
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: rgba(255,255,255,0.02); }
.data-table td.mono { font-family: var(--font-mono); }
.data-table td.amount { text-align: right; font-family: var(--font-mono); font-weight: 500; }
.data-table td.amount.neg { color: var(--red); }
.data-table td.amount.pos { color: var(--teal); }
.data-table td.muted { color: var(--text2); font-size: 12px; }
.data-table td.actions { text-align: right; }

/* ── BADGES ── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 99px;
  font-weight: 400;
  white-space: nowrap;
}
.badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.badge-paid { background: rgba(45,212,160,0.1); color: var(--teal); border: 1px solid rgba(45,212,160,0.2); }
.badge-paid::before { background: var(--teal); }
.badge-pending { background: rgba(245,166,35,0.1); color: var(--amber); border: 1px solid rgba(245,166,35,0.2); }
.badge-pending::before { background: var(--amber); }
.badge-confirmed { background: rgba(79,156,249,0.1); color: var(--blue); border: 1px solid rgba(79,156,249,0.2); }
.badge-confirmed::before { background: var(--blue); }
.badge-future { background: rgba(138,135,144,0.1); color: var(--text2); border: 1px solid rgba(138,135,144,0.2); }
.badge-future::before { background: var(--text2); }

/* ── EMPTY STATE ── */
.empty {
  padding: 3rem;
  text-align: center;
  color: var(--text3);
  font-size: 12px;
  font-family: var(--font-mono);
}

/* ── ADD FORM ── */
.add-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text2);
  background: transparent;
  border: 1px solid var(--border2);
  padding: 8px 16px;
  border-radius: var(--r);
  cursor: pointer;
  transition: all 0.15s;
}
.add-btn:hover { color: var(--accent); border-color: var(--accent); }
.add-btn svg { width: 12px; height: 12px; }

.form-wrap {
  background: var(--bg3);
  border-top: 1px solid var(--border);
  padding: 1.25rem;
  display: none;
}
.form-wrap.open { display: block; }
.form-row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
}
.form-group input, .form-group select {
  background: var(--bg4);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 9px 12px;
  outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none;
}
.form-group input:focus, .form-group select:focus { border-color: var(--accent); }
.form-group select option { background: var(--bg4); }
.form-actions { display: flex; gap: 8px; }
.btn-save {
  background: var(--accent);
  color: #0a0a0b;
  border: none;
  padding: 9px 20px;
  border-radius: var(--r);
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-save:hover { background: var(--accent2); }
.btn-cancel {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border2);
  padding: 9px 16px;
  border-radius: var(--r);
  font-family: var(--font-mono);
  font-size: 12px;
  cursor: pointer;
}
.btn-cancel:hover { color: var(--text); }
.btn-delete {
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 14px;
  padding: 4px 8px;
  border-radius: 4px;
  transition: all 0.15s;
  font-family: var(--font-mono);
}
.btn-delete:hover { color: var(--red); background: rgba(240,64,64,0.1); }
.btn-edit {
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 4px;
  transition: all 0.15s;
  font-family: var(--font-mono);
}
.btn-edit:hover { color: var(--accent); background: rgba(200,240,96,0.08); }
.edit-row td { background: var(--bg3) !important; padding: 10px 8px !important; }
.edit-row td:first-child { border-radius: var(--r) 0 0 var(--r); }
.edit-row td:last-child { border-radius: 0 var(--r) var(--r) 0; }
.edit-cell-wrap { display: flex; flex-direction: column; gap: 3px; }
.edit-cell-wrap label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); }
.edit-cell-wrap input, .edit-cell-wrap select {
  background: var(--bg4);
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 5px 8px;
  outline: none;
  width: 100%;
}
.edit-cell-wrap input:focus, .edit-cell-wrap select:focus { border-color: var(--accent); }
.edit-cell-wrap select option { background: var(--bg4); }
.btn-save-inline {
  background: var(--accent);
  color: #0a0a0b;
  border: none;
  padding: 5px 14px;
  border-radius: 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
}
.btn-save-inline:hover { background: var(--accent2); }
.btn-cancel-inline {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border2);
  padding: 5px 10px;
  border-radius: 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
}
.edit-actions { display: flex; gap: 6px; align-items: center; }

/* ── OVERVIEW GRID ── */
.ov-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.mini-progress { margin-bottom: 12px; }
.mp-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
.mp-label { font-size: 12px; color: var(--text2); }
.mp-vals { font-family: var(--font-mono); font-size: 12px; }
.mp-vals .paid-v { color: var(--teal); }
.mp-vals .total-v { color: var(--text3); }
.mp-bar-wrap { height: 5px; background: var(--bg4); border-radius: 99px; overflow: hidden; }
.mp-bar { height: 100%; border-radius: 99px; }

/* ── INCOME SECTION ── */
.income-row td.amount { color: var(--teal); }

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  .hero { grid-template-columns: 1fr 1fr; }
  .ov-grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .form-row-2 { grid-template-columns: 1fr; }
  .data-table th:nth-child(4), .data-table td:nth-child(4) { display: none; }
}
@media (max-width: 480px) {
  .hero { grid-template-columns: 1fr; }
}

/* ── CHART ── */
.chart-ring-wrap {
  display: flex;
  align-items: center;
  gap: 2rem;
  padding: 1.25rem;
  flex-wrap: wrap;
}
.chart-ring-legend { flex: 1; min-width: 180px; }
.ring-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.ring-item:last-child { border-bottom: none; }
.ring-name { display: flex; align-items: center; gap: 8px; color: var(--text2); }
.ring-swatch { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.ring-amount { font-family: var(--font-mono); color: var(--text); }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  background: var(--bg3);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 12px 20px;
  border-radius: var(--r);
  z-index: 999;
  transform: translateY(20px);
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
}
.toast.show { transform: none; opacity: 1; }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="header-tag">// financial tracker</div>
      <div class="header-title">Casa<span>.</span>Nova</div>
      <div class="header-meta">Terreno + Construção — Porto, Portugal</div>
    </div>
    <div class="last-updated" id="last-updated">Último update: —</div>
  </div>

  <!-- HERO METRICS -->
  <div class="hero" id="hero-metrics"></div>

  <!-- MASTER BAR -->
  <div class="budget-bar-section">
    <div class="bar-title">Budget allocation</div>
    <div class="master-bar" id="master-bar"></div>
    <div class="bar-legend" id="bar-legend"></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('overview')">Overview</button>
    <button class="tab" onclick="showTab('income')">Income</button>
    <button class="tab" onclick="showTab('terreno')">Terreno</button>
    <button class="tab" onclick="showTab('construcao')">Construção</button>
    <button class="tab" onclick="showTab('extras')">Extras</button>
    <button class="tab" onclick="showTab('arquiteto')">Arquiteto / Taxas</button>
    <button class="tab" onclick="showTab('adicionar')">+ Adicionar</button>
  </div>

  <!-- OVERVIEW PANEL -->
  <div class="panel active" id="panel-overview">
    <div class="ov-grid">
      <div class="block" id="ov-breakdown">
        <div class="block-header"><span class="block-title">Breakdown by category</span></div>
        <div class="chart-ring-wrap">
          <canvas id="ringChart" width="160" height="160" style="flex-shrink:0;"></canvas>
          <div class="chart-ring-legend" id="ring-legend"></div>
        </div>
      </div>
      <div class="block">
        <div class="block-header"><span class="block-title">Progress per category</span></div>
        <div style="padding: 1.25rem;" id="ov-progress"></div>
      </div>
    </div>
    <div class="block">
      <div class="block-header"><span class="block-title">Recent entries</span></div>
      <table class="data-table" id="ov-recent"></table>
    </div>
  </div>

  <!-- INCOME PANEL -->
  <div class="panel" id="panel-income">
    <div class="block">
      <div class="block-header">
        <span class="block-title">Income & funds</span>
        <span class="block-total" id="income-total"></span>
      </div>
      <table class="data-table" id="income-table"></table>
      <div class="form-wrap" id="income-form">
        <div class="form-row">
          <div class="form-group"><label>Description</label><input type="text" id="in-desc" placeholder="e.g. Bank loan disbursement"></div>
          <div class="form-group"><label>Amount (€)</label><input type="number" id="in-amount" placeholder="0.00" step="0.01" min="0"></div>
          <div class="form-group"><label>Date</label><input type="date" id="in-date"></div>
        </div>
        <div class="form-row-2">
          <div class="form-group"><label>Status</label>
            <select id="in-status">
              <option value="paid">Received</option>
              <option value="confirmed">Confirmed</option>
              <option value="future">Expected</option>
            </select>
          </div>
          <div class="form-group"><label>Note (optional)</label><input type="text" id="in-note" placeholder="Additional info"></div>
        </div>
        <div class="form-actions">
          <button class="btn-save" onclick="saveEntry('income')">Save</button>
          <button class="btn-cancel" onclick="toggleForm('income-form')">Cancel</button>
        </div>
      </div>
      <div style="padding: 1rem 1.25rem; border-top: 1px solid var(--border);">
        <button class="add-btn" onclick="toggleForm('income-form')">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/></svg>
          Add income entry
        </button>
      </div>
    </div>
  </div>

  <!-- TERRENO PANEL -->
  <div class="panel" id="panel-terreno">
    <div class="block">
      <div class="block-header">
        <span class="block-title">Compra do Terreno</span>
        <span class="block-total" id="terreno-total"></span>
      </div>
      <table class="data-table" id="terreno-table"></table>
      <div class="form-wrap" id="terreno-form">
        <div class="form-row">

<script>
const BIN_ID = '69cf8d1f856a682189f6b452';
const API_KEY = '$2a$10$xNypD7fXKvN6Hgf8kYQIb.NRKibz6uLerHEK0L692THfH/2BcFlBG';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

const COLORS = {
  income:    '#2dd4a0',
  terreno:   '#c8f060',
  construcao:'#4f9cf9',
  extras:    '#f5a623',
  arquiteto: '#9b7ef8',
  free:      '#1f1f26',
};

function defaultData() {
  return {
    lastUpdated: null,
    income: [
      { id: 1, desc: 'Venda casa atual — saldo líquido', amount: 142503.50, date: '2025-10-28', status: 'paid', note: 'Após comissão imobiliária, liquidação empréstimo e taxa abatimento 2%' },
      { id: 2, desc: 'Empréstimo bancário', amount: 285000, date: '2026-01-01', status: 'paid', note: 'Crédito habitação solicitado' },
      { id: 3, desc: 'Reembolso sinal — Tina e Zé', amount: 7900, date: '2025-10-28', status: 'paid', note: 'Sinal do terreno pago por Tina e Zé, reembolsado' },
    ],
    terreno: [
      { id: 1, desc: 'Sinal — 10% do valor do terreno', amount: 7900, date: '2025-10-28', status: 'paid', note: '' },

      { id: 3, desc: 'Valor restante — escritura', amount: 71100, date: '2026-01-05', status: 'paid', note: 'Terreno 79.000€ total' },
      { id: 4, desc: 'Licença de construção', amount: 6340.51, date: '2026-03-16', status: 'paid', note: '' },
      { id: 5, desc: 'Taxas e impostos escritura terreno', amount: 6000, date: '', status: 'future', note: 'Estimativa' },
      { id: 6, desc: 'Escritura notarial', amount: 400, date: '', status: 'future', note: 'Estimativa' },
    ],
    construcao: [
      { id: 1, desc: 'Construção chave-na-mão (incl. IVA)', amount: 300000, date: '', status: 'confirmed', note: 'Exclui cozinha' },
      { id: 2, desc: 'Cozinha — armários + eletrodomésticos', amount: 8000, date: '', status: 'future', note: 'Estimativa' },
    ],
    extras: [
      { id: 1, desc: 'Relva artificial', amount: 2000, date: '', status: 'future', note: '' },
      { id: 2, desc: 'Sala — mesa + cadeiras', amount: 1400, date: '', status: 'future', note: 'sklum.com — conjunto Uleno 240x100cm' },
      { id: 3, desc: 'Sala — sofá', amount: 1200, date: '', status: 'future', note: '' },
      { id: 4, desc: 'Mobília exterior', amount: 1100, date: '', status: 'future', note: 'sklum.com — conjunto Kaela 180x90cm' },
      { id: 5, desc: 'Quarto Dinis', amount: 5000, date: '', status: 'future', note: '' },
    ],
    arquiteto: [],
  };
}

let state = defaultData();
let isSaving = false;

function setSyncStatus(status) {
  const el = document.getElementById('last-updated');
  if (!el) return;
  if (status === 'saving') {
    el.textContent = '↑ saving...';
    el.style.color = 'var(--amber)';
  } else if (status === 'saved') {
    el.textContent = 'Updated: ' + fmtDate(new Date().toISOString().split('T')[0]);
    el.style.color = 'var(--teal)';
    setTimeout(() => { el.style.color = 'var(--text3)'; }, 2000);
  } else if (status === 'error') {
    el.textContent = '⚠ sync error — check connection';
    el.style.color = 'var(--red)';
  } else if (status === 'loading') {
    el.textContent = '↓ loading...';
    el.style.color = 'var(--text3)';
  }
}

async function loadState() {
  setSyncStatus('loading');
  try {
    const res = await fetch(BIN_URL + '/latest', {
      headers: { 'X-Master-Key': API_KEY }
    });
    const json = await res.json();
    const data = json.record;
    if (data && data.income && data.terreno) {
      state = data;
    }
    // else keep defaultData — bin was empty/init
  } catch(e) {
    showToast('Could not reach cloud — showing defaults.');
  }
  render();
  setSyncStatus('saved');
}

async function saveState() {
  if (isSaving) return;
  isSaving = true;
  state.lastUpdated = new Date().toISOString();
  setSyncStatus('saving');
  try {
    const res = await fetch(BIN_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': API_KEY
      },
      body: JSON.stringify(state)
    });
    if (!res.ok) throw new Error('save failed');
    setSyncStatus('saved');
  } catch(e) {
    setSyncStatus('error');
    showToast('⚠ Could not save — check your connection.');
  }
  isSaving = false;
}

/* ─── FORMATTING ─── */
const fmtEur = n => new Intl.NumberFormat('pt-PT', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(n);
const fmtDate = d => d ? new Date(d + (d.length === 10 ? 'T00:00:00' : '')).toLocaleDateString('pt-PT', { day: '2-digit', month: 'short', year: 'numeric' }) : '—';

function badge(status) {
  const map = { paid: 'Pago', confirmed: 'Confirmado', pending: 'Pendente', future: 'Futuro' };
  return `<span class="badge badge-${status}">${map[status] || status}</span>`;
}

/* ─── SUMS ─── */
function sumAll(arr) { return arr.reduce((s, e) => s + e.amount, 0); }
function sumPaid(arr) { return arr.filter(e => e.status === 'paid').reduce((s, e) => s + e.amount, 0); }
function sumCommitted(arr) { return arr.filter(e => ['paid','confirmed'].includes(e.status)).reduce((s, e) => s + e.amount, 0); }

/* ─── RENDER HERO ─── */
function renderHero() {
  const totalIncome = sumAll(state.income);
  const totalOut = sumAll(state.terreno) + sumAll(state.construcao) + sumAll(state.extras) + sumAll(state.arquiteto);
  const totalPaid = sumPaid(state.terreno) + sumPaid(state.construcao) + sumPaid(state.extras) + sumPaid(state.arquiteto);
  const free = totalIncome - totalOut;
  const freeClass = free >= 0 ? 'free' : 'spent';

  document.getElementById('hero-metrics').innerHTML = `
    <div class="hero-card total"><div class="hero-label">Total budget</div><div class="hero-value total">${fmtEur(totalIncome)}</div><div class="hero-sub">Venda + Empréstimo</div></div>
    <div class="hero-card spent"><div class="hero-label">Total planned</div><div class="hero-value spent">${fmtEur(totalOut)}</div><div class="hero-sub">All categories</div></div>
    <div class="hero-card paid"><div class="hero-label">Actually paid</div><div class="hero-value paid">${fmtEur(totalPaid)}</div><div class="hero-sub">Cash out so far</div></div>
    <div class="hero-card free"><div class="hero-label">${free >= 0 ? 'Buffer' : 'Deficit'}</div><div class="hero-value ${freeClass}">${fmtEur(Math.abs(free))}</div><div class="hero-sub">${free >= 0 ? 'Remaining margin' : 'Over budget'}</div></div>
  `;

  // Master bar
  const total = totalIncome || 1;
  const segs = [
    { key: 'terreno', label: 'Terreno', val: sumAll(state.terreno), color: COLORS.terreno },
    { key: 'construcao', label: 'Construção', val: sumAll(state.construcao), color: COLORS.construcao },
    { key: 'extras', label: 'Extras', val: sumAll(state.extras), color: COLORS.extras },
    { key: 'arquiteto', label: 'Arquiteto', val: sumAll(state.arquiteto), color: COLORS.arquiteto },
  ];
  const freeVal = Math.max(0, free);
  document.getElementById('master-bar').innerHTML = segs.map(s =>
    `<div class="bar-seg" style="width:${(s.val/total*100).toFixed(1)}%;background:${s.color};"></div>`
  ).join('') + `<div class="bar-seg" style="flex:1;background:var(--bg4);"></div>`;

  document.getElementById('bar-legend').innerHTML = segs.map(s =>
    `<span class="legend-item"><span class="legend-dot" style="background:${s.color};"></span>${s.label}: ${fmtEur(s.val)}</span>`
  ).join('') + `<span class="legend-item"><span class="legend-dot" style="background:var(--bg4);border:1px solid var(--border2);"></span>Buffer: ${fmtEur(freeVal)}</span>`;
}

/* ─── RENDER TABLE ─── */
function renderTable(tbId, arr, isIncome) {
  const tb = document.getElementById(tbId);
  if (!tb) return;
  const cat = tbId.replace('-table', '');
  if (!arr.length) {
    tb.innerHTML = `<thead><tr><th>Date</th><th>Description</th><th>Note</th><th>Status</th><th class="right">Amount</th><th></th></tr></thead><tr><td colspan="6" class="empty">No entries yet — add one below</td></tr>`;
    return;
  }
  const amtClass = isIncome ? 'pos' : 'neg';
  const sorted = [...arr].sort((a,b) => (a.date || '9999') > (b.date || '9999') ? 1 : -1);
  tb.innerHTML = `<thead><tr><th>Date</th><th>Description</th><th>Note</th><th>Status</th><th class="right">Amount</th><th></th></tr></thead><tbody>` +
    sorted.map(e => normalRow(e, cat, isIncome)).join('') + '</tbody>';
}

function normalRow(e, cat, isIncome) {
  const amtClass = isIncome ? 'pos' : 'neg';
  const sign = (isIncome || e.amount < 0) ? '+' : '-';
  const displayAmt = (e.amount < 0 && !isIncome) ? `+${fmtEur(Math.abs(e.amount))}` : (isIncome ? `+${fmtEur(e.amount)}` : `-${fmtEur(e.amount)}`);
  const amtCls = isIncome ? 'pos' : (e.amount < 0 ? 'pos' : 'neg');
  return `<tr id="row-${cat}-${e.id}" data-cat="${cat}" data-id="${e.id}" data-isincome="${isIncome}">
    <td class="mono muted">${fmtDate(e.date)}</td>
    <td>${e.desc}</td>
    <td class="muted">${e.note || '—'}</td>
    <td>${badge(e.status)}</td>
    <td class="amount ${amtCls}">${displayAmt}</td>
    <td class="actions" style="white-space:nowrap;">
      <button class="btn-edit" onclick="editEntry('${cat}',${e.id})" title="Edit">✎</button>
      <button class="btn-delete" onclick="deleteEntry('${cat}', ${e.id})" title="Delete">✕</button>
    </td>
  </tr>`;
}

/* ─── EDIT ENTRY ─── */
function editEntry(cat, id) {
  // Close any other open edit rows first
  document.querySelectorAll('.edit-row').forEach(r => {
    const c = r.dataset.cat, i = parseInt(r.dataset.id), isIn = r.dataset.isincome === 'true';
    r.outerHTML = normalRow(state[c].find(e => e.id === i), c, isIn);
  });

  const e = state[cat].find(e => e.id === id);
  if (!e) return;
  const isIncome = cat === 'income';

  const statusOptions = isIncome
    ? ['paid','confirmed','future'].map(s => `<option value="${s}" ${e.status===s?'selected':''}>${{paid:'Received',confirmed:'Confirmed',future:'Expected'}[s]}</option>`).join('')
    : ['paid','confirmed','pending','future'].map(s => `<option value="${s}" ${e.status===s?'selected':''}>${{paid:'Paid',confirmed:'Confirmed',pending:'Pending',future:'Future'}[s]}</option>`).join('');

  const row = document.getElementById(`row-${cat}-${id}`);
  row.classList.add('edit-row');
  row.innerHTML = `
    <td><div class="edit-cell-wrap"><label>Date</label><input type="date" id="ei-date" value="${e.date||''}"></div></td>
    <td colspan="2"><div class="edit-cell-wrap"><label>Description</label><input type="text" id="ei-desc" value="${e.desc}">
      <input type="text" id="ei-note" value="${e.note||''}" placeholder="Note (optional)" style="margin-top:4px;"></div></td>
    <td><div class="edit-cell-wrap"><label>Status</label><select id="ei-status">${statusOptions}</select></div></td>
    <td><div class="edit-cell-wrap"><label>Amount (€)</label><input type="number" id="ei-amount" value="${Math.abs(e.amount)}" step="0.01" min="0" style="width:110px;"></div></td>
    <td><div class="edit-actions">
      <button class="btn-save-inline" onclick="saveEdit('${cat}',${id})">Save</button>
      <button class="btn-cancel-inline" onclick="cancelEdit('${cat}',${id})">✕</button>
    </div></td>
  `;
}

function saveEdit(cat, id) {
  const e = state[cat].find(e => e.id === id);
  if (!e) return;
  const desc = document.getElementById('ei-desc').value.trim();
  const amount = parseFloat(document.getElementById('ei-amount').value);
  if (!desc || isNaN(amount) || amount <= 0) { showToast('Description and amount required.'); return; }
  e.desc = desc;
  e.amount = (cat !== 'income' && e.amount < 0) ? -amount : amount;
  e.date = document.getElementById('ei-date').value;
  e.status = document.getElementById('ei-status').value;
  e.note = document.getElementById('ei-note').value.trim();
  saveState();
  render();
  showToast('Entry updated.');
}

function cancelEdit(cat, id) {
  const e = state[cat].find(e => e.id === id);
  if (!e) return;
  const isIncome = cat === 'income';
  const row = document.getElementById(`row-${cat}-${id}`);
  row.classList.remove('edit-row');
  row.outerHTML = normalRow(e, cat, isIncome);
}

/* ─── DELETE ─── */

/* ─── RENDER OVERVIEW ─── */
function renderOverview() {
  const cats = [
    { key: 'income', label: 'Income', color: COLORS.income },
    { key: 'terreno', label: 'Terreno', color: COLORS.terreno },
    { key: 'construcao', label: 'Construção', color: COLORS.construcao },
    { key: 'extras', label: 'Extras', color: COLORS.extras },
    { key: 'arquiteto', label: 'Arquiteto', color: COLORS.arquiteto },
  ];

  const totalIn = sumAll(state.income);

  // Ring legend
  document.getElementById('ring-legend').innerHTML = cats.slice(1).map(c => {
    const val = sumAll(state[c.key]);
    const pct = totalIn > 0 ? (val/totalIn*100).toFixed(1) : 0;
    return `<div class="ring-item">
      <span class="ring-name"><span class="ring-swatch" style="background:${c.color};"></span>${c.label}</span>
      <span class="ring-amount">${fmtEur(val)} <span style="color:var(--text3);font-size:10px;">${pct}%</span></span>
    </div>`;
  }).join('') + `<div class="ring-item">
    <span class="ring-name"><span class="ring-swatch" style="background:var(--bg4);border:1px solid var(--border2);"></span>Buffer</span>
    <span class="ring-amount" style="color:var(--teal);">${fmtEur(Math.max(0, totalIn - cats.slice(1).reduce((s,c)=>s+sumAll(state[c.key]),0)))}</span>
  </div>`;

  // Draw ring chart
  drawRing(cats.slice(1).map(c => ({ val: sumAll(state[c.key]), color: c.color })), totalIn);

  // Progress bars
  document.getElementById('ov-progress').innerHTML = cats.slice(1).map(c => {
    const total = sumAll(state[c.key]);
    const paid = sumPaid(state[c.key]);
    const pct = total > 0 ? Math.min(100, (paid/total*100).toFixed(0)) : 0;
    return `<div class="mini-progress">
      <div class="mp-header">
        <span class="mp-label">${c.label}</span>
        <span class="mp-vals"><span class="paid-v">${fmtEur(paid)}</span> <span class="total-v">/ ${fmtEur(total)}</span></span>
      </div>
      <div class="mp-bar-wrap"><div class="mp-bar" style="width:${pct}%;background:${c.color};"></div></div>
    </div>`;
  }).join('');

  // Recent entries — last 8 across all
  const all = [
    ...state.terreno.map(e => ({...e, cat: 'Terreno'})),
    ...state.construcao.map(e => ({...e, cat: 'Construção'})),
    ...state.extras.map(e => ({...e, cat: 'Extras'})),
    ...state.arquiteto.map(e => ({...e, cat: 'Arquiteto'})),
    ...state.income.map(e => ({...e, cat: 'Income', isIn: true})),
  ].filter(e => e.date).sort((a,b) => b.date > a.date ? 1 : -1).slice(0, 8);

  const recentTb = document.getElementById('ov-recent');
  if (!all.length) {
    recentTb.innerHTML = `<tr><td class="empty">No dated entries yet.</td></tr>`;
  } else {
    recentTb.innerHTML = `<thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Status</th><th class="right">Amount</th></tr></thead><tbody>` +
      all.map(e => `<tr>
        <td class="mono muted">${fmtDate(e.date)}</td>
        <td>${e.desc}</td>
        <td class="muted">${e.cat}</td>
        <td>${badge(e.status)}</td>
        <td class="amount ${e.isIn ? 'pos' : 'neg'}">${e.isIn ? '+' : '-'}${fmtEur(Math.abs(e.amount))}</td>
      </tr>`).join('') + '</tbody>';
  }
}

/* ─── RING CHART ─── */
function drawRing(segments, total) {
  const canvas = document.getElementById('ringChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = 160, cx = 80, cy = 80, ro = 70, ri = 48;
  ctx.clearRect(0, 0, W, W);
  let angle = -Math.PI / 2;
  const freeVal = Math.max(0, total - segments.reduce((s,sg)=>s+sg.val, 0));
  const allSegs = [...segments, { val: freeVal, color: '#1f1f26' }];
  allSegs.forEach(sg => {
    if (!sg.val) return;
    const sweep = (sg.val / (total || 1)) * 2 * Math.PI;
    ctx.beginPath();
    ctx.moveTo(cx + ro * Math.cos(angle), cy + ro * Math.sin(angle));
    ctx.arc(cx, cy, ro, angle, angle + sweep);
    ctx.arc(cx, cy, ri, angle + sweep, angle, true);
    ctx.closePath();
    ctx.fillStyle = sg.color;
    ctx.fill();
    angle += sweep;
  });
  // center text
  ctx.fillStyle = '#8a8790';
  ctx.font = '500 11px DM Mono, monospace';
  ctx.textAlign = 'center';
  ctx.fillText('TOTAL', cx, cy - 6);
  ctx.fillStyle = '#f0ede8';
  ctx.font = '600 14px Syne, sans-serif';
  ctx.fillText(fmtEur(total), cx, cy + 10);
}

/* ─── TOTALS ─── */
function renderTotals() {
  const map = { income: 'income-total', terreno: 'terreno-total', construcao: 'construcao-total', extras: 'extras-total', arquiteto: 'arquiteto-total' };
  Object.entries(map).forEach(([cat, id]) => {
    const el = document.getElementById(id);
    if (el) el.textContent = fmtEur(sumAll(state[cat]));
  });
}

/* ─── TABS ─── */
function showTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  const tabs = ['overview','income','terreno','construcao','extras','arquiteto','adicionar'];
  document.querySelectorAll('.tab')[tabs.indexOf(name)]?.classList.add('active');
}

/* ─── TOGGLE FORM ─── */
function toggleForm(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

/* ─── SAVE ENTRY ─── */
function saveEntry(cat) {
  let actualCat = cat;
  let desc, amount, date, status, note;

  if (cat === 'quick') {
    actualCat = document.getElementById('quick-cat').value;
    desc = document.getElementById('quick-desc').value.trim();
    amount = parseFloat(document.getElementById('quick-amount').value);
    date = document.getElementById('quick-date').value;
    status = document.getElementById('quick-status').value;
    note = document.getElementById('quick-note').value.trim();
  } else {
    desc = document.getElementById(`${cat}-desc`).value.trim();
    amount = parseFloat(document.getElementById(`${cat}-amount`).value);
    date = document.getElementById(`${cat}-date`).value;
    status = document.getElementById(`${cat}-status`).value;
    note = document.getElementById(`${cat}-note`)?.value.trim() || '';
  }

  if (!desc || isNaN(amount) || amount <= 0) {
    showToast('Please fill in description and amount.');
    return;
  }

  const maxId = state[actualCat].length ? Math.max(...state[actualCat].map(e => e.id)) : 0;
  state[actualCat].push({ id: maxId + 1, desc, amount, date, status, note });
  saveState();
  render();

  if (cat === 'quick') {
    ['quick-desc','quick-amount','quick-date','quick-note'].forEach(id => document.getElementById(id).value = '');
    showToast('Entry saved to ' + actualCat);
  } else {
    toggleForm(`${cat}-form`);
    ['desc','amount','date','note'].forEach(f => { const el = document.getElementById(`${cat}-${f}`); if(el) el.value = ''; });
    showToast('Entry saved.');
  }
}

/* ─── DELETE ─── */
function deleteEntry(cat, id) {
  if (!confirm('Remove this entry?')) return;
  state[cat] = state[cat].filter(e => e.id !== id);
  saveState();
  render();
  showToast('Entry removed.');
}

/* ─── TOAST ─── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ─── RENDER ALL ─── */
function render() {
  renderHero();
  renderOverview();
  renderTotals();
  renderTable('income-table', state.income, true);
  renderTable('terreno-table', state.terreno, false);
  renderTable('construcao-table', state.construcao, false);
  renderTable('extras-table', state.extras, false);
  renderTable('arquiteto-table', state.arquiteto, false);
}

// Set today's date on all date inputs
document.querySelectorAll('input[type="date"]').forEach(el => {
  el.value = new Date().toISOString().split('T')[0];
});

loadState();
</script>
